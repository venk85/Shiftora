services:
  postgres:
    image: postgres:16
    container_name: shiftora-postgres
    environment:
      POSTGRES_DB: shiftora
      POSTGRES_USER: shiftora
      POSTGRES_PASSWORD: shiftora
    ports:
      - "5432:5432"
    volumes:
      - shiftora_postgres:/var/lib/postgresql/data

volumes:
  shiftora_postgres:
