server:
  port: ${PORT:8081}
  tomcat:
    max-http-form-post-size: 20MB

spring:
  config:
    import:
      - optional:file:../.env.local[.properties]
      - optional:file:.env.local[.properties]
  application:
    name: shiftora-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/shiftora}
    username: ${DATABASE_USERNAME:shiftora}
    password: ${DATABASE_PASSWORD:shiftora}
  flyway:
    enabled: true
    placeholder-replacement: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

shiftora:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5173}
  kys:
    api-base-url: ${KYS_API_BASE_URL:https://kys.udiseplus.gov.in/web-app/api/}
    app-signature: ${KYS_APP_SIGNATURE:9f2c7a4b8e1d6c3f5a9b0e2d4f6a7c8b}
